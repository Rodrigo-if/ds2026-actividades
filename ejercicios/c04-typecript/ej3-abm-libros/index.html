<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
</head>

<body onload="renderizar(lista_libros)">
    <h1>Catálogo</h1>
    <form id="formulario">
        <input type="text" id="isbn" placeholder="ISBN" required><br>
        <input type="text" id="titulo" placeholder="Título" required><br>
        <input type="text" id="autor" placeholder="Autor" required><br>
        <input type="float" id="precio" placeholder="Precio" required><br>
        <input type="text" id="genero" placeholder="Género" required><br>
        <input type="checkbox" id="disponible"> Disponible<br>
        <button type="submit" onclick="validarFormulario()">Agregar libro</button>
        <div id="errorForm"></div>
    </form><br>
    <input type="text" id="filtroAutor" placeholder="Escribir autor">
    <button id="filtrar" onclick="renderizar(buscarPorAutor(document.getElementById('filtroAutor').value))">Filtrar</button>
    <button id="mostrarDisponibles" onclick="renderizar(mostrarDisponibles())">Solo disponibles</button>
    <button id="mostrarTodos" onclick="renderizar(lista_libros)">Ver todos</button>
    <ul id="listado"></ul>
    <p id="stats"></p>
    <script src="app.js"></script>
</body>

</html>
