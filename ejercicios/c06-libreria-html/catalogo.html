<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Catálogo</title>
</head>

<body onload="renderizarLibros('catalogo', 'bestseller', 30)">      <!-- idContenedor, query, n -->
    <nav class="navbar navbar-expand-lg navbar-bg">   <!-- Navbar de bootstrap -->
        <div class="container-fluid">
            <a class="navbar-brand" href="#">   <!-- href="#" para indicar que va al principio -->
                <img src="./img/logoLibreria.png" alt="Logo" width="65" height="65" class="d-inline-block align-text-center">
                Librería virtual
            </a>
            <div class="navbar-nav me-auto mb-2 mb-lg-0">   <!-- me-auto para alinear a la izquierda -->
                <a class="nav-link" href="./index.html">Inicio</a>
                <a class="nav-link active" aria-current="page" href="./catalogo.html">Catálogo</a>
                <a class="nav-link" href="./contacto.html">Contacto</a>
            </div>
        </div>
    </nav>
    <div class="decoracion-guirnaldas">
        <img src="./img/guirnaldas.png" alt="Decoración" class="w-100">
    </div>
    <div class="container my-5">
        <h1 class="text-center mb-5">Catálogo de libros</h1>
        <div class="d-flex justify-content-center align-items-center flex-column">
            <input type="text" id="busquedaCatalogo" class="form-control mb-4 w-50" placeholder="Buscar..." oninput="filtrarCatalogo()">
            <p id="mensajeCarga"></p>
        </div>
        <div class="row d-flex justify-content-center gap-4" id="catalogo">
            <!-- Acá se renderiza el catálogo -->
        </div>
        <div class="text-center mt-3">
            <button id="botonInicio" class="btn">Volver al inicio</button>
        </div>
    </div>
    <script src="./js/data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
