<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Contacto</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-bg">   <!-- Navbar de bootstrap -->
        <div class="container-fluid">
            <a class="navbar-brand" href="#">   <!-- href="#" para indicar que va al principio -->
                <img src="./img/logoLibreria.png" alt="Logo" width="65" height="65" class="d-inline-block align-text-center">
                Librería virtual
            </a>
            <div class="navbar-nav me-auto mb-2 mb-lg-0">   <!-- me-auto para alinear a la izquierda -->
                <a class="nav-link" href="./index.html">Inicio</a>
                <a class="nav-link" href="./catalogo.html">Catálogo</a>
                <a class="nav-link active" aria-current="page" href="./contacto.html">Contacto</a>
            </div>
        </div>
    </nav>
    <div class="decoracion-guirnaldas">
        <img src="./img/guirnaldas.png" alt="Decoración" class="w-100">
    </div>
    <form class="container my-5" style="max-width: 600px;">
        <div class="d-flex flex-column my-5 gap-3 p-3">
            <div class="mb-3">
                <label for="nombreForm" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombreForm" aria-describedby="emailHelp" required>
            </div>
            <div class="mb-3">
                <label for="mailForm" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="mailForm" aria-describedby="emailHelp" required>
            </div>
            <div class="mb-3">
                <label for="opcionForm" class="form-label">Asunto</label>
                <select class="form-select" aria-label="Default select example" id="opcionForm" required>
                    <option selected>Consulta</option>
                    <option value="2">Sugerencia</option>
                    <option value="3">Reclamo</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="mensajeForm" class="form-label">Mensaje</label>
                <textarea class="form-control" id="mensajeForm" rows="4" required></textarea>
            </div>
        </div>
        <div class="d-flex justify-content-end gap-3 p-3">
            <button type="submit" class="btn">Aceptar</button>
        </div>
    </form>
    <div class="mt-3 gap-3 p-3 d-flex justify-content-left">
        <a href="./index.html" id="botonVolver" class="btn">Volver al Inicio</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
