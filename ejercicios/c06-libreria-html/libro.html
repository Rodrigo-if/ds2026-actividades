<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/styles.css">
    <title>Libro</title>
</head>

<body onload="cargarLibroSeleccionado()">
    <nav class="navbar navbar-expand-lg navbar-bg">   <!-- Navbar de bootstrap -->
        <div class="container-fluid">
            <a class="navbar-brand" href="#">   <!-- href="#" para indicar que va al principio -->
                <img src="./img/logoLibreria.png" alt="Logo" width="65" height="65" class="d-inline-block align-text-center">
                Librería virtual
            </a>
            <div class="navbar-nav me-auto mb-2 mb-lg-0">   <!-- me-auto para alinear a la izquierda -->
                <a class="nav-link" href="./index.html">Inicio</a>
                <a class="nav-link" href="./catalogo.html">Catálogo</a>
                <a class="nav-link" href="./contacto.html">Contacto</a>
                <a class="nav-link active" aria-current="page" href="./libro.html">Libro</a>
            </div>
        </div>
    </nav>
    <div class="decoracion-guirnaldas">
        <img src="./img/guirnaldas.png" alt="Decoración" class="w-100">
    </div>
    <div class="container my-5 detalles-libro">
        <div class="row">
            <div class="col-md-4">
                <img id="portada" src="..." alt="Portada del libro" class="img-fluid">
            </div>
            <div class="col-md-8 position-relative">
                <h1 id="titulo"></h1>
                <h3 id="autor"></h3>
                <p>Descripción detallada del libro, incluyendo su trama, personajes y cualquier otro detalle relevante que pueda interesar a los lectores.</p>
                <div class="mt-auto position-absolute d-flex end-0 bottom-0 gap-3 p-3">
                    <h3 class="mb-0 mt-1" id="precio"></h3>
                    <button class="btn">Comprar</button>     <!-- Precio y descripción genéricos ya que la API no los proporciona directamente y el fetch con la key del libro tiende a generar errores-->
                </div>
            </div>
        </div>
    </div>
    <script src="./js/data.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
